name: PHP CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, pdo, pdo_mysql, mbstring
          tools: php-cs-fixer

      - name: Check PHP syntax (all files)
        run: find . -name "*.php" -not -path "./vendor/*" | xargs -I{} php -l {}

      - name: Check code style
        run: php-cs-fixer fix --dry-run --diff --rules=@PSR12
        continue-on-error: true  # warn only, don't fail the build yet
deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /var/www/wifi-hotspot-billing
            git pull origin main
            # config/database.php is gitignored — never overwritten
            # Clear any PHP opcache if applicable
            php -r "opcache_reset();" 2>/dev/null || true
